<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股損益試算單</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root{
    --ink:#14161c;
    --paper:#eef0ea;
    --paper-dim:#c9cdc0;
    --rule:#3a3d36;
    --red:#d1453b;   /* 台股慣例：紅漲 */
    --green:#1f9e5c; /* 台股慣例：綠跌 */
    --gold:#c9a227;
    --mono:'IBM Plex Mono', 'Courier New', monospace;
    --sans:'Noto Sans TC', -apple-system, sans-serif;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--ink);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(201,162,39,0.06) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(209,69,59,0.05) 0%, transparent 45%);
    color:var(--paper);
    font-family:var(--sans);
    min-height:100vh;
    padding:32px 16px;
  }

  .wrap{
    max-width:680px;
    margin:0 auto;
  }

  .masthead{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:2px solid var(--gold);
    padding-bottom:14px;
    margin-bottom:6px;
  }
  .masthead h1{
    font-size:26px;
    font-weight:900;
    letter-spacing:1px;
    margin:0;
  }
  .masthead .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    color:var(--gold);
    letter-spacing:3px;
    text-transform:uppercase;
    margin:0 0 4px;
  }
  .masthead .ticket-no{
    font-family:var(--mono);
    font-size:11px;
    color:var(--paper-dim);
    text-align:right;
  }

  .panel{
    background:rgba(255,255,255,0.02);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:22px;
    margin-top:20px;
  }

  .panel-title{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:2px;
    color:var(--gold);
    text-transform:uppercase;
    margin:0 0 16px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .panel-title::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--rule);
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  .grid.three{grid-template-columns:1fr 1fr 1fr;}

  @media (max-width:520px){
    .grid, .grid.three{grid-template-columns:1fr 1fr;}
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .field label{
    font-size:12px;
    color:var(--paper-dim);
    display:flex;
    justify-content:space-between;
  }
  .field label .hint{
    font-family:var(--mono);
    font-size:10px;
    color:var(--gold);
    opacity:0.75;
  }
  .field .inputRow{
    position:relative;
    display:flex;
    align-items:center;
  }
  .field .prefix{
    position:absolute;
    left:12px;
    font-family:var(--mono);
    font-size:13px;
    color:var(--paper-dim);
    pointer-events:none;
  }
  .field .suffix{
    position:absolute;
    right:12px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--paper-dim);
    pointer-events:none;
  }
  input[type=number]{
    width:100%;
    background:rgba(0,0,0,0.35);
    border:1px solid var(--rule);
    color:var(--paper);
    font-family:var(--mono);
    font-size:14px;
    padding:10px 12px 10px 26px;
    border-radius:2px;
    outline:none;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .field.hasSuffix input{padding-right:44px;}
  input[type=number]:focus{
    border-color:var(--gold);
    background:rgba(0,0,0,0.5);
  }
  input[type=number]:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:1px;
  }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button{
    -webkit-appearance:none; margin:0;
  }

  .toggleRow{
    display:flex;
    gap:8px;
    margin-top:4px;
  }
  .toggleRow button{
    flex:1;
    background:rgba(0,0,0,0.35);
    border:1px solid var(--rule);
    color:var(--paper-dim);
    font-family:var(--sans);
    font-size:12px;
    padding:8px;
    border-radius:2px;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .toggleRow button.active{
    border-color:var(--gold);
    color:var(--gold);
    background:rgba(201,162,39,0.08);
  }
  .toggleRow button:focus-visible{outline:2px solid var(--gold); outline-offset:1px;}

  /* --- Receipt / Slip --- */
  .slip{
    margin-top:24px;
    background:var(--paper);
    color:var(--ink);
    border-radius:2px;
    position:relative;
    padding:26px 24px 24px;
    box-shadow:0 12px 30px rgba(0,0,0,0.4);
  }
  .slip::before, .slip::after{
    content:'';
    position:absolute;
    left:0; right:0;
    height:10px;
    background-image:radial-gradient(circle at 6px 5px, var(--ink) 5px, transparent 5.5px);
    background-size:16px 10px;
    background-repeat:repeat-x;
  }
  .slip::before{top:-5px;}
  .slip::after{bottom:-5px; transform:rotate(180deg);}

  .slip h2{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    margin:0 0 14px;
    border-bottom:1px dashed var(--rule);
    padding-bottom:10px;
    color:#5a5d52;
  }

  .lineItem{
    display:flex;
    justify-content:space-between;
    font-family:var(--mono);
    font-size:13.5px;
    padding:5px 0;
  }
  .lineItem .label{color:#4a4d44;}
  .lineItem .value{font-weight:600;}
  .lineItem.deduct .value::before{content:'\2212  ';}
  .lineItem.sub .value::before{content:'';}

  .divider{
    border:none;
    border-top:1px dashed var(--rule);
    margin:10px 0;
  }

  .result{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-top:14px;
    padding-top:14px;
    border-top:2px solid var(--ink);
  }
  .result .rlabel{
    font-size:14px;
    font-weight:700;
  }
  .result .rvalue{
    font-family:var(--mono);
    font-size:26px;
    font-weight:700;
  }
  .rvalue.up{color:var(--red);}     /* 獲利 → 紅 */
  .rvalue.down{color:var(--green);} /* 虧損 → 綠 */
  .rvalue.flat{color:#5a5d52;}

  .roiTag{
    display:inline-block;
    font-family:var(--mono);
    font-size:11px;
    padding:2px 8px;
    border-radius:20px;
    margin-top:6px;
  }
  .roiTag.up{background:rgba(209,69,59,0.12); color:var(--red);}
  .roiTag.down{background:rgba(31,158,92,0.12); color:var(--green);}
  .roiTag.flat{background:rgba(90,93,82,0.12); color:#5a5d52;}

  .footnote{
    margin-top:10px;
    font-family:var(--mono);
    font-size:10px;
    color:#8a8d80;
    line-height:1.6;
  }

  .legend{
    margin-top:18px;
    font-family:var(--mono);
    font-size:10px;
    color:var(--paper-dim);
    display:flex;
    gap:18px;
    justify-content:center;
    opacity:0.8;
  }
  .legend span::before{
    content:'\25CF';
    margin-right:5px;
  }
  .legend .r::before{color:var(--red);}
  .legend .g::before{color:var(--green);}

  /* --- Comparison table --- */
  .tablePanel{
    margin-top:24px;
    background:var(--paper);
    color:var(--ink);
    border-radius:2px;
    position:relative;
    padding:22px 20px 20px;
    box-shadow:0 12px 30px rgba(0,0,0,0.4);
  }
  .tablePanel::before, .tablePanel::after{
    content:'';
    position:absolute;
    left:0; right:0;
    height:10px;
    background-image:radial-gradient(circle at 6px 5px, var(--ink) 5px, transparent 5.5px);
    background-size:16px 10px;
    background-repeat:repeat-x;
  }
  .tablePanel::before{top:-5px;}
  .tablePanel::after{bottom:-5px; transform:rotate(180deg);}

  .tablePanel h2{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    margin:0 0 4px;
    color:#5a5d52;
  }
  .tablePanel .subhint{
    font-family:var(--mono);
    font-size:10.5px;
    color:#8a8d80;
    margin:0 0 14px;
  }

  .moreBtn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    width:100%;
    background:transparent;
    border:1px dashed var(--rule);
    color:#5a5d52;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:1px;
    padding:8px;
    border-radius:2px;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .moreBtn:hover{border-color:var(--gold); color:var(--gold); background:rgba(201,162,39,0.06);}
  .moreBtn:focus-visible{outline:2px solid var(--gold); outline-offset:1px;}
  .moreBtn.top{margin-bottom:10px;}
  .moreBtn.bottom{margin-top:10px;}

  table.cmp{
    width:100%;
    border-collapse:collapse;
    font-family:var(--mono);
    font-size:12.5px;
  }
  table.cmp thead th{
    text-align:right;
    font-weight:600;
    font-size:10.5px;
    letter-spacing:0.5px;
    color:#5a5d52;
    padding:6px 8px;
    border-bottom:1px solid var(--ink);
    white-space:nowrap;
  }
  table.cmp thead th:first-child, table.cmp thead th:nth-child(2){text-align:right;}
  table.cmp tbody td{
    text-align:right;
    padding:7px 8px;
    border-bottom:1px dashed var(--rule);
    white-space:nowrap;
  }
  table.cmp tbody tr:hover{background:rgba(0,0,0,0.035);}
  table.cmp tbody tr.breakeven{
    background:rgba(201,162,39,0.10);
  }
  table.cmp tbody tr.breakeven td:first-child{
    box-shadow:inset 3px 0 0 var(--gold);
  }
  table.cmp td.up{color:var(--red); font-weight:600;}
  table.cmp td.down{color:var(--green); font-weight:600;}
  table.cmp td.flat{color:#5a5d52;}
  .scrollWrap{overflow-x:auto;}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <p class="panel-title">交易方向</p>
    <div class="toggleRow" role="group" aria-label="交易方向">
      <button type="button" id="dirLong" class="active">做多 LONG（先買後賣）</button>
      <button type="button" id="dirShort">做空 SHORT（先賣後買）</button>
    </div>
  </div>

  <div class="panel">
    <p class="panel-title">交易單位</p>
    <div class="toggleRow" role="group" aria-label="數量單位">
      <button type="button" id="unitLot" class="active">整股（1張＝1000股）</button>
      <button type="button" id="unitShare">股數（自訂）</button>
    </div>
    <div class="grid" style="margin-top:16px;">
      <div class="field" id="qtyField">
        <label for="qty">張數 <span class="hint">LOTS</span></label>
        <div class="inputRow">
          <span class="prefix">×</span>
          <input type="number" id="qty" value="1" min="0" step="1">
        </div>
      </div>
      <div class="field" id="anchorField">
        <label for="buyPrice">買進價 <span class="hint">BUY</span></label>
        <div class="inputRow">
          <span class="prefix">$</span>
          <input type="number" id="buyPrice" value="100" min="0" step="0.01">
        </div>
      </div>
      <div class="field">
        <label for="priceStep">價格間距 <span class="hint">STEP</span></label>
        <div class="inputRow">
          <span class="prefix">$</span>
          <input type="number" id="priceStep" value="0.05" min="0.01" step="0.01">
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <p class="panel-title">費率設定</p>
    <div class="grid three">
      <div class="field hasSuffix">
        <label for="feeRate">手續費率 <span class="hint">FEE</span></label>
        <div class="inputRow">
          <input type="number" id="feeRate" value="0.1425" min="0" step="0.0001">
          <span class="suffix">%</span>
        </div>
      </div>
      <div class="field hasSuffix">
        <label for="feeDiscount">手續費折數 <span class="hint">DISCOUNT</span></label>
        <div class="inputRow">
          <input type="number" id="feeDiscount" value="2.5" min="0" max="10" step="0.1">
          <span class="suffix">折</span>
        </div>
      </div>
      <div class="field">
        <label for="feeMin">單筆低消 <span class="hint">MIN FEE</span></label>
        <div class="inputRow">
          <span class="prefix">$</span>
          <input type="number" id="feeMin" value="20" min="0" step="1">
        </div>
      </div>
    </div>
    <div class="grid" style="margin-top:16px;">
      <div class="field hasSuffix">
        <label for="taxRate">證交稅率 <span class="hint">TAX（賣出課徵）</span></label>
        <div class="inputRow">
          <input type="number" id="taxRate" value="0.3" min="0" step="0.01">
          <span class="suffix">%</span>
        </div>
      </div>
      <div class="field">
        <label>常見稅率</label>
        <div class="toggleRow">
          <button type="button" class="taxPreset active" data-rate="0.3">股票 0.3%</button>
          <button type="button" class="taxPreset" data-rate="0.15">現股當沖 0.15%</button>
          <button type="button" class="taxPreset" data-rate="0.1">ETF 0.1%</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tablePanel">
    <h2>損益比較表 // P&amp;L Comparison</h2>
    <p class="subhint" id="tableSubhint">以買入價為基準，依「價格間距」上下展開各賣出價的損益試算。</p>

    <button type="button" class="moreBtn top" id="moreTop">
      <span>&#9650;</span> 顯示更多
    </button>

    <div class="scrollWrap">
      <table class="cmp">
        <thead>
          <tr>
            <th>買入價格</th>
            <th>賣出價格</th>
            <th>證交稅</th>
            <th>總手續費</th>
            <th>獲利</th>
            <th>報酬率</th>
          </tr>
        </thead>
        <tbody id="cmpBody"></tbody>
      </table>
    </div>

    <button type="button" class="moreBtn bottom" id="moreBottom">
      <span>&#9660;</span> 顯示更多
    </button>

  </div>

  <div class="legend">
    <span class="r">獲利（紅）</span>
    <span class="g">虧損（綠）</span>
  </div>

</div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  const qtyField = $('qtyField');
  const qtyInput = $('qty');
  const unitLotBtn = $('unitLot');
  const unitShareBtn = $('unitShare');
  let unitMode = 'lot'; // 'lot' | 'share'

  const dirLongBtn = $('dirLong');
  const dirShortBtn = $('dirShort');
  const anchorLabel = $('anchorField').querySelector('label');
  let tradeDirection = 'long'; // 'long' | 'short'

  function updateDirectionUI(){
    if (tradeDirection === 'long') {
      anchorLabel.innerHTML = '買進價（進場） <span class="hint">BUY</span>';
      $('tableSubhint').textContent = '做多：以買進價（進場）為基準，依「價格間距」上下展開各賣出價（出場）的損益試算。';
    } else {
      anchorLabel.innerHTML = '賣出價（放空進場） <span class="hint">SHORT</span>';
      $('tableSubhint').textContent = '做空：以賣出價（放空進場）為基準，依「價格間距」上下展開各買進價（回補出場）的損益試算。';
    }
  }

  dirLongBtn.addEventListener('click', () => {
    tradeDirection = 'long';
    dirLongBtn.classList.add('active');
    dirShortBtn.classList.remove('active');
    updateDirectionUI();
    calculate();
  });
  dirShortBtn.addEventListener('click', () => {
    tradeDirection = 'short';
    dirShortBtn.classList.add('active');
    dirLongBtn.classList.remove('active');
    updateDirectionUI();
    calculate();
  });

  unitLotBtn.addEventListener('click', () => {
    unitMode = 'lot';
    unitLotBtn.classList.add('active');
    unitShareBtn.classList.remove('active');
    qtyField.querySelector('label').innerHTML = '張數 <span class="hint">LOTS</span>';
    qtyInput.value = 1;
    calculate();
  });
  unitShareBtn.addEventListener('click', () => {
    unitMode = 'share';
    unitShareBtn.classList.add('active');
    unitLotBtn.classList.remove('active');
    qtyField.querySelector('label').innerHTML = '股數 <span class="hint">SHARES</span>';
    qtyInput.value = 1000;
    calculate();
  });

  document.querySelectorAll('.taxPreset').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.taxPreset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $('taxRate').value = btn.dataset.rate;
      calculate();
    });
  });

  const fmt = n => {
    const sign = n < 0 ? '-' : '';
    return sign + Math.round(Math.abs(n)).toLocaleString('en-US');
  };
  const fmtSigned = n => {
    const sign = n > 0 ? '+' : (n < 0 ? '-' : '');
    return sign + Math.round(Math.abs(n)).toLocaleString('en-US');
  };
  const fmtPrice = n => {
    // trim trailing zeros but keep up to 2 decimals
    return (Math.round(n * 100) / 100).toString();
  };
  const fmtPct = n => (n > 0 ? '+' : (n < 0 ? '-' : '')) + Math.abs(n).toFixed(2) + '%';

  const ROWS_INITIAL = 11;   // rows shown around the buy price on first render
  const ROWS_INCREMENT = 5;  // rows added per "顯示更多" click
  let rowsAbove = Math.floor(ROWS_INITIAL / 2);
  let rowsBelow = Math.floor(ROWS_INITIAL / 2);

  function computeRow(buyPrice, sellPrice, shares, feeRate, feeDiscount, feeMin, taxRate){
    const buyAmt = buyPrice * shares;
    const sellAmt = sellPrice * shares;
    const buyFee = buyAmt > 0 ? Math.max(buyAmt * feeRate * feeDiscount, feeMin) : 0;
    const sellFee = sellAmt > 0 ? Math.max(sellAmt * feeRate * feeDiscount, feeMin) : 0;
    const taxAmt = sellAmt * taxRate;
    const totalFee = buyFee + sellFee;
    const totalCost = buyAmt + buyFee;
    const totalRevenue = sellAmt - sellFee - taxAmt;
    const netProfit = totalRevenue - totalCost;
    const roi = totalCost > 0 ? (netProfit / totalCost) * 100 : 0;
    return {buyPrice, sellPrice, taxAmt, totalFee, netProfit, roi};
  }

  function calculate(){
    const qty = parseFloat(qtyInput.value) || 0;
    const shares = unitMode === 'lot' ? qty * 1000 : qty;

    const anchorPrice = parseFloat($('buyPrice').value) || 0;
    const step = parseFloat($('priceStep').value) || 0.05;

    const feeRate = (parseFloat($('feeRate').value) || 0) / 100;
    const feeDiscount = (parseFloat($('feeDiscount').value) || 10) / 10;
    const feeMin = parseFloat($('feeMin').value) || 0;
    const taxRate = (parseFloat($('taxRate').value) || 0) / 100;

    const tbody = $('cmpBody');
    tbody.innerHTML = '';

    // Build the varying leg from highest to lowest, anchor price always included as the breakeven row.
    // LONG:  anchor = buy (entry), varying = sell (exit)
    // SHORT: anchor = sell (short-sale entry, taxed here), varying = buy-to-cover (exit)
    for (let i = rowsAbove; i >= -rowsBelow; i--) {
      const varyingPrice = anchorPrice + i * step;
      if (varyingPrice < 0) continue;

      const buyPrice = tradeDirection === 'long' ? anchorPrice : varyingPrice;
      const sellPrice = tradeDirection === 'long' ? varyingPrice : anchorPrice;

      const row = computeRow(buyPrice, sellPrice, shares, feeRate, feeDiscount, feeMin, taxRate);

      const tr = document.createElement('tr');
      const isBreakevenRow = Math.abs(varyingPrice - anchorPrice) < 1e-9;
      if (isBreakevenRow) tr.classList.add('breakeven');

      const pClass = row.netProfit > 0.5 ? 'up' : (row.netProfit < -0.5 ? 'down' : 'flat');

      tr.innerHTML =
        '<td>' + fmtPrice(row.buyPrice) + '</td>' +
        '<td>' + fmtPrice(row.sellPrice) + '</td>' +
        '<td>' + fmt(row.taxAmt) + '</td>' +
        '<td>' + fmt(row.totalFee) + '</td>' +
        '<td class="' + pClass + '">' + fmtSigned(row.netProfit) + '</td>' +
        '<td class="' + pClass + '">' + fmtPct(row.roi) + '</td>';

      tbody.appendChild(tr);
    }
  }

  $('moreTop').addEventListener('click', () => {
    rowsAbove += ROWS_INCREMENT;
    calculate();
  });
  $('moreBottom').addEventListener('click', () => {
    rowsBelow += ROWS_INCREMENT;
    calculate();
  });

  document.querySelectorAll('input[type=number]').forEach(inp => {
    inp.addEventListener('input', calculate);
  });

  $('ticketTime').textContent = 'NO. ' + Date.now().toString().slice(-8);

  updateDirectionUI();
  calculate();
})();
</script>

</body>
</html>
